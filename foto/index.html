<!doctype html>
<!-- lang="nl" vertelt de browser dat de pagina in het Nederlands is -->
<html lang="nl">
  <head>
    <!-- charset="UTF-8" zorgt dat speciale tekens zoals é correct worden weergegeven -->
    <meta charset="UTF-8" />
    <!-- viewport zorgt dat de pagina correct schaalt op mobiele schermen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mijn Foto App - Image Editor</title>
    <!-- link koppelt ons CSS bestand aan deze pagina voor de styling -->
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- id="app" is het hoofdelement, CSS en JavaScript zoeken dit element op -->
    <div id="app">
      <!-- LINKERKANT: Bestand kiezen & Acties -->
      <aside class="controls-left">
        <h1>Mijn Foto App</h1>

        <div class="input-group">
          <label>Nieuwe Foto</label>
          <!-- type="file" opent de bestandskiezer van het toestel -->
          <!-- accept="image/*" filtert zodat de gebruiker alleen afbeeldingen kan kiezen -->
          <!-- display:none verbergt dit input veld, de knop hieronder activeert het via JavaScript -->
          <input
            type="file"
            id="file-input"
            accept="image/*"
            style="display: none"
          />
          <!-- id="upload-trigger" wordt door main.js gebruikt om de verborgen file input te activeren -->
          <button id="upload-trigger" class="upload-btn">
            📂 Kies van laptop
          </button>
        </div>

        <!-- visuele scheiding tussen de upload en download knop -->
        <div style="margin: 20px 0; border-top: 1px solid #7dd3fc"></div>

        <!-- id="download-btn" wordt door main.js herkend om de download te starten -->
        <button id="download-btn" class="download-btn">
          📥 Download Bewerkt
        </button>
      </aside>

      <!-- MIDDEN: De Foto Preview -->
      <!-- id="foto-container" wordt door FotoManager.js gebruikt om foto's dynamisch in te plaatsen -->
      <section id="foto-container" class="foto-sectie">
        <!-- placeholder tekst die zichtbaar is zolang er nog geen foto geladen is -->
        <div class="placeholder-text">
          <p>Klik op "Kies van laptop" om een foto te bewerken...</p>
        </div>
      </section>

      <!-- RECHTERKANT: Filters -->
      <aside class="controls-right">
        <h2>Filters</h2>
        <!-- data-filter is een custom attribuut dat door main.js wordt uitgelezen bij een klik -->
        <!-- de waarde (bv. "f-grayscale") wordt als CSS klasse op de foto gezet -->
        <button class="filter-btn" data-filter="f-grayscale">Zwart-wit</button>
        <button class="filter-btn" data-filter="f-sepia">Sepia</button>
        <button class="filter-btn" data-filter="f-invert">Invert</button>
        <!-- data-filter="" betekent geen filter, filter-active staat hier standaard aan -->
        <button class="filter-btn filter-active" data-filter="">Geen</button>

        <p class="helper-text">
          Kies een filter en klik daarna op downloaden om de bewerkte foto op te
          slaan.
        </p>
      </aside>
    </div>

    <!-- type="module" is nodig omdat main.js import/export gebruikt -->
    <!-- zonder type="module" begrijpt de browser de import statements niet -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
